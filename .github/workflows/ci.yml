name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents encore en cours sur la même branche/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Compile check
        run: uv run python -m compileall -q agent.py app.py config.py tools

      - name: Import smoke test
        run: uv run python -c "import config, tools.adzuna; print('imports OK')"
